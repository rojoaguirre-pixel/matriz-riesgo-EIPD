<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EIPD RiskStudio v3.0 - Dinámico</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6 text-sm text-slate-800">
    <div class="max-w-5xl mx-auto bg-white p-8 rounded-2xl shadow-lg border border-slate-200">
        <h1 class="text-2xl font-black text-blue-900 mb-2 italic uppercase">EIPD RiskStudio - Consultoría Real</h1>
        <p class="text-slate-500 mb-6 italic">Ingresa el contexto real para generar el RAT, EIPD y Mapa de Riesgo.</p>
        
        <textarea id="userInput" rows="5" class="w-full p-4 border rounded-xl bg-slate-50 mb-4" placeholder="Ej: Somos 2 trabajadores, recolectamos nombres de futbolistas amateur, no usamos IA..."></textarea>
        
        <button onclick="procesarAnalisis()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg uppercase tracking-widest transition-all">
            Generar Análisis Personalizado
        </button>

        <div id="resultados" class="hidden mt-10 space-y-8">
            <div class="p-6 bg-slate-900 text-white rounded-2xl border-l-8 border-blue-500">
                <h3 class="text-blue-400 font-bold uppercase text-xs mb-2">Resumen Ejecutivo para Directorio</h3>
                <p id="resumenTexto" class="italic"></p>
            </div>

            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                <h3 class="font-bold text-blue-800 uppercase mb-4 italic">Registro de Actividades de Tratamiento (RAT)</h3>
                <table class="w-full text-left text-[11px]">
                    <tr class="border-b uppercase text-slate-400 font-black italic">
                        <th class="p-2">Proceso Detectado</th><th class="p-2">Magnitud</th><th class="p-2">EIPD Requerida</th><th class="p-2">Nivel de Riesgo</th>
                    </tr>
                    <tr id="ratFila" class="italic"></tr>
                </table>
            </div>
        </div>
    </div>

    <script>
        function procesarAnalisis() {
            const input = document.getElementById('userInput').value.toLowerCase();
            const resultados = document.getElementById('resultados');
            const resumen = document.getElementById('resumenTexto');
            const ratFila = document.getElementById('ratFila');

            // Lógica de Detección Simple
            let tieneIA = input.includes("ia") || input.includes("inteligencia");
            let tieneBiometria = input.includes("biometrico") || input.includes("huella") || input.includes("rostro");
            let numTrabajadores = input.match(/\d+/) ? parseInt(input.match(/\d+/)[0]) : 0;

            // Evaluación de Riesgo
            let riesgo = "BAJO";
            let eipd = "NO OBLIGATORIA";
            let colorRiesgo = "text-emerald-600";

            if (tieneIA || tieneBiometria || numTrabajadores > 250) {
                riesgo = "CRÍTICO";
                eipd = "OBLIGATORIA";
                colorRiesgo = "text-red-600";
            } else if (numTrabajadores > 50) {
                riesgo = "MEDIO";
                colorRiesgo = "text-orange-600";
            }

            // Inyectar Resultados
            resumen.innerText = `Empresa con ${numTrabajadores} trabajadores. Al ${tieneIA || tieneBiometria ? 'detectarse' : 'no detectarse'} tecnologías de alto impacto, el nivel de riesgo es ${riesgo}. Se recomienda ${numTrabajadores < 10 ? 'medidas básicas de seguridad' : 'implementar ISO 27001'}.`;
            
            ratFila.innerHTML = `
                <td class="p-2 font-bold">Captura de datos amateur</td>
                <td class="p-2">${numTrabajadores} empleados</td>
                <td class="p-2 font-bold">${eipd}</td>
                <td class="p-2 font-black ${colorRiesgo}">${riesgo}</td>
            `;

            resultados.classList.remove('hidden');
        }
    </script>
</body>
</html>
